<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff8fab">
  <title>女孩日記 - 月經紀錄表</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>女孩日記 <i class="fa-solid fa-seedling"></i></h1>
  </header>

  <!-- Main Content -->
  <main>
    <!-- View: Home / Dashboard -->
    <section id="view-home" class="view active">
      <div class="status-card">
        <div class="circle-indicator" id="cycle-circle">
          <p class="circle-title">距離下次經期</p>
          <h2 class="circle-days" id="days-countdown">--</h2>
          <p class="circle-subtitle">天</p>
        </div>
        <p class="prediction-text" id="prediction-text">預測下次開始：----/--/--</p>
        
        <div class="action-buttons">
          <button id="btn-start-period" class="btn btn-primary"><i class="fa-solid fa-droplet"></i> 月經來了</button>
          <button id="btn-end-period" class="btn btn-secondary hidden"><i class="fa-solid fa-check"></i> 月經結束了</button>
        </div>
      </div>

      <div class="recent-records">
        <h3>最近紀錄</h3>
        <div id="records-list" class="records-list">
          <div class="empty-state">目前還沒有紀錄喔！</div>
        </div>
      </div>
    </section>

    <!-- View: Add Record (Detailed) -->
    <section id="view-add" class="view">
      <h2 class="section-title">新增詳細紀錄</h2>
      <form id="record-form" class="form-container">
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="record-date" required>
        </div>
        
        <div class="form-group">
          <label>血量</label>
          <div class="radio-group">
            <label class="radio-btn"><input type="radio" name="flow" value="少"><span>少量</span></label>
            <label class="radio-btn"><input type="radio" name="flow" value="中" checked><span>中等</span></label>
            <label class="radio-btn"><input type="radio" name="flow" value="多"><span>量多</span></label>
          </div>
        </div>

        <div class="form-group">
          <label>痛經程度</label>
          <div class="radio-group">
            <label class="radio-btn"><input type="radio" name="pain" value="無" checked><span>無感</span></label>
            <label class="radio-btn"><input type="radio" name="pain" value="輕微"><span>輕微</span></label>
            <label class="radio-btn"><input type="radio" name="pain" value="嚴重"><span>嚴重</span></label>
          </div>
        </div>

        <div class="form-group">
          <label>心情 / 備註</label>
          <textarea id="record-notes" rows="3" placeholder="今天感覺如何呢？"></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-block"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存紀錄</button>
      </form>
    </section>

    <!-- View: Calendar (月曆) -->
    <section id="view-calendar" class="view">
      <h2 class="section-title">月曆紀錄</h2>
      <div class="calendar-container">
        <div class="calendar-header">
          <button id="prev-month" class="btn-icon"><i class="fa-solid fa-chevron-left"></i></button>
          <h3 id="calendar-month-year">2026年 5月</h3>
          <button id="next-month" class="btn-icon"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <div class="calendar-weekdays">
          <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div id="calendar-days" class="calendar-days">
          <!-- JavaScript 將會在這裡自動生成每一天的格子 -->
        </div>
      </div>
      <div class="calendar-legend">
        <span class="legend-item"><span class="dot dot-period"></span> 經期</span>
        <span class="legend-item"><span class="dot dot-predicted"></span> 預測期</span>
      </div>
    </section>

    <!-- View: Settings / Sync -->
    <section id="view-settings" class="view">
      <h2 class="section-title">設定與同步</h2>

      <div class="settings-card">
        <h3>個人週期設定</h3>
        <div class="form-group">
          <label>平均週期長度（天）</label>
          <input type="number" id="cycle-length" value="28" min="20" max="45">
        </div>
        <div class="form-group">
          <label>平均經期長度（天）</label>
          <input type="number" id="period-length" value="5" min="2" max="14">
        </div>
        <button id="btn-save-cycle" class="btn btn-secondary btn-block">儲存週期設定</button>
      </div>
      
      <div class="settings-card danger-zone">
        <h3>資料管理</h3>
        <button id="btn-clear-data" class="btn btn-danger btn-block"><i class="fa-solid fa-trash-can"></i> 清除本機資料</button>
      </div>
    </section>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-target="view-home">
      <i class="fa-solid fa-house"></i>
      <span>首頁</span>
    </button>
    <button class="nav-btn" data-target="view-calendar">
      <i class="fa-solid fa-calendar-days"></i>
      <span>月曆</span>
    </button>
    <button class="nav-btn" data-target="view-add">
      <i class="fa-solid fa-plus"></i>
      <span>紀錄</span>
    </button>
    <button class="nav-btn" data-target="view-settings">
      <i class="fa-solid fa-gear"></i>
      <span>設定</span>
    </button>
  </nav>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
    <p>處理中...</p>
  </div>

  <script src="app.js"></script>
</body>
</html>

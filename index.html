<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0b1a">
  <meta name="description" content="365天存款挑戰紀錄器 - 追蹤你的每日存款進度，連接Google試算表同步資料">
  <title>365 存款挑戰</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="icon" type="image/png" href="icon-512.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Bar -->
  <header class="top-bar">
    <h1>💰 365 存款挑戰</h1>
    <button class="sync-btn" id="syncBtn" onclick="syncWithSheets()">
      <span id="syncText">同步</span>
    </button>
  </header>

  <!-- ===== Home Tab ===== -->
  <div class="tab-page active" id="page-home">
    <div class="card hero-card">
      <div class="progress-ring-container">
        <svg class="progress-ring" width="160" height="160" viewBox="0 0 160 160">
          <defs>
            <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="var(--accent-purple)"/>
              <stop offset="100%" stop-color="var(--accent-blue)"/>
            </linearGradient>
          </defs>
          <circle class="progress-ring-bg" cx="80" cy="80" r="68"/>
          <circle class="progress-ring-fill" id="progressRing" cx="80" cy="80" r="68"
            stroke-dasharray="427.26" stroke-dashoffset="427.26"/>
        </svg>
        <div class="progress-center">
          <div class="big-num" id="completedCount">0</div>
          <div class="sub">/ 365 天</div>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">已存金額</div>
        <div class="value gold" id="totalSaved">0</div>
      </div>
      <div class="stat-card">
        <div class="label">目標金額</div>
        <div class="value blue" id="targetAmount">83,085</div>
      </div>
      <div class="stat-card">
        <div class="label">雙倍區完成</div>
        <div class="value green" id="doubleCompleted">0 / 180</div>
      </div>
      <div class="stat-card">
        <div class="label">正常區完成</div>
        <div class="value green" id="normalCompleted">0 / 185</div>
      </div>
    </div>

    <div class="card today-card" id="todayCard">
      <div class="day-badge double" id="todayBadge">
        <div class="day-num" id="todayDayNum">1</div>
        <div class="day-label">天</div>
      </div>
      <div class="today-info">
        <div class="title">今日應存天數</div>
        <div class="desc" id="todayDesc">第 1 天（雙倍期）</div>
        <div class="behind" id="todayBehind" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- ===== Deposit Tab ===== -->
  <div class="tab-page" id="page-deposit">
    <div class="pool-info" style="margin-top: 8px; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 16px;">
      <span id="poolProgress">剩餘 365 個金額</span>
      <span id="poolSubtotal">未存總額：0 元</span>
    </div>
    <div class="amount-grid" id="amountGrid"></div>
  </div>

  <!-- ===== History Tab ===== -->
  <div class="tab-page" id="page-history">
    <div class="history-summary">
      <div class="stat-card">
        <div class="label">總筆數</div>
        <div class="value green" id="histTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="label">總金額</div>
        <div class="value gold" id="histAmount">0</div>
      </div>
      <div class="stat-card">
        <div class="label">進度</div>
        <div class="value blue" id="histPercent">0%</div>
      </div>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">
        <div class="icon">📋</div>
        <div>尚無存款紀錄</div>
      </div>
    </div>
  </div>

  <!-- ===== Settings Tab ===== -->
  <div class="tab-page" id="page-settings">
    <div class="card">
      <div class="setting-group">
        <label for="startDateInput">挑戰開始日期</label>
        <input type="date" id="startDateInput">
      </div>
      <div class="setting-group">
        <label for="scriptUrlInput">Google Apps Script URL</label>
        <input type="url" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/...">
      </div>
      <div class="setting-group">
        <label for="sheetUrlInput">Google 試算表連結 (可選)</label>
        <div style="display: flex; gap: 8px;">
          <input type="url" id="sheetUrlInput" placeholder="https://docs.google.com/spreadsheets/..." style="flex:1;">
          <button class="btn btn-outline" onclick="openSheet()" style="white-space: nowrap; padding: 0 12px; font-size: 0.9rem;">開啟試算表</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:8px">儲存設定</button>

      <div style="margin-top:12px">
        <button class="btn btn-danger" onclick="confirmReset()" style="width:100%">重置資料</button>
      </div>
    </div>
  </div>

  <!-- ===== Confirm Modal ===== -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-content">
      <h3>確認存款</h3>
      <div class="modal-amount">
        <div><span class="big" id="modalAmount">0</span> <span class="unit">元</span></div>
        <div class="tag double" id="modalTag">雙倍區</div>
      </div>
      <div class="modal-buttons">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="modalConfirmBtn" onclick="confirmDeposit()">確認存入</button>
      </div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== Bottom Nav ===== -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首頁</span>
    </button>
    <button class="nav-item" data-tab="deposit" onclick="switchTab('deposit')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
      <span>存款</span>
    </button>
    <button class="nav-item" data-tab="history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      <span>紀錄</span>
    </button>
    <button class="nav-item" data-tab="settings" onclick="switchTab('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span>設定</span>
    </button>
  </nav>

  <script src="app.js"></script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    }
  </script>
</body>
</html>
